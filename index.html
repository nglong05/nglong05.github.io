<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>nglong05 | Repositories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* General Styles */
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #1f2028;
            color: #bfc3d9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sidebar */
        #sidebar, #rightbar {
            position: fixed;
            top: 0;
            width: 220px;
            height: 100vh;
            background: linear-gradient(to right, rgba(39, 41, 53, 1), rgba(39, 41, 53, 0));
            padding: 20px;
            text-align: left;
            z-index: 10;
        }
        #sidebar { left: 0; }
        #rightbar { right: 0; background: linear-gradient(to left, rgba(39, 41, 53, 1), rgba(39, 41, 53, 0)); }

        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 220px;
            width: calc(100% - 440px);
            height: 50px;
            background: rgba(31, 32, 40, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            z-index: 5;
        }

        /* Search & Icons */
        #header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #search-box {
            background: transparent;
            border: 1px solid #bfc3d9;
            padding: 5px 10px;
            border-radius: 12px;
            color: #bfc3d9;
            font-size: 12px;
            width: 180px;
        }
        #search-box::placeholder { color: rgba(255, 255, 255, 0.7); }
        #header-right a { color: white; font-size: 18px; text-decoration: none; }

        /* Main Content */
        #content {
            margin-left: 250px;
            margin-right: 250px;
            margin-top: 80px;
            width: 60%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .repo-box {
            background: rgba(50, 52, 64, 0.9);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .repo-box:hover { transform: scale(1.05); }

        /* Footer */
        #footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #bfc3d9;
        }
    </style>
</head>
<body>
    <div id="sidebar"></div>
    <div id="rightbar"></div>

    <div id="header">
        <div id="header-right">
            <input type="text" id="search-box" placeholder=" Search...">
            <a href="https://facebook.com/nguyenIong05" target="_blank" title="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://github.com/nglong05" target="_blank" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="mailto:long82510@gmail.com?subject=Inquiry" title="Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
    </div>

    <div id="content"></div>

    <div id="footer">Created by nglong05 | Thanks for visiting!</div>

    <script>
        async function fetchRepos() {
            const response = await fetch("https://api.github.com/users/nglong05/repos");
            const repos = await response.json();
            const content = document.getElementById("content");
            content.innerHTML = "";
            
            const allowedRepos = ["CTF-write-ups", "TryHackMe", "PortSwigger", "RootMe"];
            repos.forEach(repo => {
                if (allowedRepos.includes(repo.name)) {
                    const box = document.createElement("div");
                    box.className = "repo-box";
                    box.innerHTML = `<strong>${repo.name}</strong><br><small>${repo.description || "No description"}</small>`;
                    box.onclick = () => window.location.href = "/" + repo.name;
                    content.appendChild(box);
                }
            });
        }
        
        document.getElementById("search-box").oninput = function() {
            alert("No flag for you");
            this.value = "";
        };
        
        fetchRepos();
    </script>
</body>
</html>
